description: >-
  The U.S. Access Board is an independent federal agency that promotes equality
  for people with disabilities through the development of accessibility
  guidelines and standards. The Board develops criteria for accessibility in the
  built environment, transportation, communication, and information and
  communication technology (ICT). It enforces the Architectural Barriers Act
  (ABA) for federally funded facilities and provides technical assistance,
  training, and guidance documents to help organizations implement accessibility
  requirements under the Americans with Disabilities Act (ADA) and Section 508
  of the Rehabilitation Act.
common:
  - type: Website
    url: https://www.access-board.gov/
  - type: About
    url: https://www.access-board.gov/about/
  - type: GettingStarted
    url: https://www.access-board.gov/guidance.html
  - type: TermsOfService
    url: https://www.access-board.gov/about/policy/
  - type: Features
    data:
      - name: ADA Accessibility Standards
        description: >-
          Minimum accessibility guidelines for places of public accommodation,
          commercial facilities, and state and local government facilities under
          the Americans with Disabilities Act.
      - name: Section 508 ICT Standards
        description: >-
          Technical and functional requirements for information and communication
          technology procured or developed by federal agencies under Section 508
          of the Rehabilitation Act.
      - name: Section 255 Guidelines
        description: >-
          Accessibility requirements for telecommunications equipment and
          customer premises equipment manufacturers under the Telecommunications
          Act.
      - name: ABA Standards
        description: >-
          Accessibility standards for facilities designed, built, altered, or
          leased with federal funds under the Architectural Barriers Act.
      - name: Technical Assistance
        description: >-
          Free technical assistance through webinars, training sessions, and
          direct responses to accessibility questions from designers, builders,
          and individuals with disabilities.
      - name: Guidance Documents
        description: >-
          Comprehensive guidance documents, animations, and technical aids
          explaining how to apply accessibility standards in practice.
  - type: UseCases
    data:
      - name: Federal ICT Procurement
        description: >-
          Federal agencies use Section 508 Standards to ensure that ICT they
          procure or develop is accessible to employees and members of the
          public with disabilities.
      - name: Building Accessibility Compliance
        description: >-
          Architects, builders, and facility managers use ADA and ABA Standards
          to design and construct accessible facilities.
      - name: Telecommunications Accessibility
        description: >-
          Telecommunications manufacturers use Section 255 Guidelines to build
          accessible telecommunications equipment and customer premises
          equipment.
      - name: Public Right-of-Way Design
        description: >-
          Transportation engineers and municipalities use PROWAG guidelines for
          designing accessible pedestrian facilities, including crosswalks,
          curb ramps, and shared-use paths.
      - name: Accessibility Training
        description: >-
          Organizations attend Access Board training and webinars to learn how
          to implement accessibility requirements across built environments and
          technology systems.
  - type: Integrations
    data:
      - name: Section508.gov
        description: >-
          GSA-administered government-wide IT accessibility program that
          implements Section 508 Standards and provides guidance and tools for
          federal agencies.
      - name: WCAG
        description: >-
          Web Content Accessibility Guidelines developed by W3C, harmonized with
          Section 508 ICT Standards for web and software accessibility.
      - name: European EN 301 549
        description: >-
          European accessibility standard for ICT products and services,
          harmonized with Section 508 to facilitate international procurement.
      - name: ADA Standards for Accessible Design
        description: >-
          Standards issued by the DOJ and DOT that incorporate Access Board ADA
          guidelines and apply them to specific regulated entities.
